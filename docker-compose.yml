version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vehicle-rental-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: vehicle_rental
      MYSQL_USER: vehicleuser
      MYSQL_PASSWORD: vehiclepass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: vehicle-rental-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=vehicleuser
      - DB_PASSWORD=vehiclepass
      - DB_NAME=vehicle_rental
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./public:/app/public

volumes:
  mysql_data:
